<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>SVG Export Test</title>
<style>body{background:#222;color:#eee;font-family:monospace;}#canvasWrap canvas{background:#000}</style>
</head>
<body>
<div id="status">Loading...</div>
<div id="canvasWrap">
<canvas id="testCanvas" width="600" height="600"></canvas>
</div>
<div id="render"></div>
<script type="module">
const status = document.getElementById('status');
const render = document.getElementById('render');

try {
    const { VoidRenderer } = await import('/js/core/VoidRenderer.js');
    const { VoidExporter } = await import('/js/core/VoidExporter.js');
    
    const params0 = new URLSearchParams(location.search);
    const presetName = params0.get('preset') || 'bender';
    const showCanvas = params0.get('canvas') === '1';
    const presetRes = await fetch(`/presets/${presetName}.json`);
    const preset = await presetRes.json();
    // Override colorMode if requested
    const overrideColor = params0.get('color');
    if (overrideColor) preset.settings.colorMode = overrideColor;
    status.textContent = `Loaded ${preset.name}`;
    
    const canvas = document.getElementById('testCanvas');
    const renderer = new VoidRenderer(canvas);
    
    const s = preset.settings;
    const settings = {
        get: (k) => s[k]
    };
    
    const moduleSize = s.moduleSize;
    const stem = moduleSize * s.stemMultiplier * 2;
    const letterSpacing = moduleSize * s.letterSpacingMultiplier;
    const lineHeight = moduleSize * s.lineHeightMultiplier;
    
    function getDerivedMode() {
        const lines = s.strokesNum ?? 2;
        const dash = s.dashEnabled ?? false;
        if (dash && lines > 1) return 'sd';
        if (dash) return 'dash';
        if (lines > 1) return 'stripes';
        return 'fill';
    }
    
    const mode = getDerivedMode();
    status.textContent += ` | mode=${mode} | colorMode=${s.colorMode}`;
    
    const params = {
        stem,
        moduleSize,
        letterSpacing,
        lineHeight,
        strokesNum: s.strokesNum,
        strokeGapRatio: s.strokeGapRatio,
        mode,
        color: s.letterColor,
        bgColor: s.bgColor,
        gridColor: s.gridColor,
        textAlign: s.textAlign || 'center',
        showGrid: s.showGrid,
        isRandom: false,
        text: s.text,
        roundedCaps: s.roundedCaps || false,
        closeEnds: s.closeEnds || false,
        dashEnabled: s.dashEnabled || false,
        dashLength: s.dashLength,
        gapLength: s.gapLength,
        dashChess: s.dashChess || false,
        useCustomModuleColor: false,
        wobblyEnabled: s.wobblyEnabled || false,
        wobblyAmount: s.wobblyAmount || 0,
        wobblyFrequency: s.wobblyFrequency || 0.1,
        gradientMode: s.colorMode,
        gradientStartColor: s.gradientStartColor,
        gradientEndColor: s.gradientEndColor,
    };
    
    renderer.alternativeGlyphCache = preset.alternativeGlyphCache || {};
    renderer.moduleValueCache = preset.moduleValueCache || {};
    
    if (s.colorMode === 'randomGradient' && preset.gradientPairs) {
        let gradientIdx = 0;
        const gradCache = new Map();
        renderer.setGradientGetter(() => {
            const idx = gradientIdx++;
            if (!gradCache.has(idx)) {
                gradCache.set(idx, preset.gradientPairs[idx % preset.gradientPairs.length]);
            }
            return gradCache.get(idx);
        });
    }
    
    renderer.updateParams(params);
    
    if (showCanvas) {
        renderer.render();
        status.textContent += ' | canvas rendered';
    } else {
        const exporter = new VoidExporter(renderer, settings);
        const svg = exporter.getSVGContent();
        render.innerHTML = svg;
        status.textContent += ' | svg rendered';
    }
} catch (e) {
    status.textContent = `ERROR: ${e.message}\n${e.stack}`;
    console.error(e);
}
</script>
</body>
</html>
