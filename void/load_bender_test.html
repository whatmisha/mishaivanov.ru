<!DOCTYPE html>
<html>
<head><meta charset="utf-8"><title>Load Bender</title></head>
<body>
<script>
// Set localStorage so that the app loads Bender on init.
// Then redirect to the app.
const presetName = new URLSearchParams(location.search).get('preset') || 'Bender';

(async () => {
    try {
        // First, we need to pretend Bender is the current preset.
        // The app loads presets from /presets/ files via initPresets.
        // Let's just redirect with hash and use the loadPreset programmatically.
        const res = await fetch(`/presets/${presetName.toLowerCase()}.json`);
        const preset = await res.json();
        
        // Inject the preset into localStorage
        const settingsStore = preset.settings;
        // Set the user_presets in localStorage if needed
        // Actually the simplest path: store currentPresetName + persist settings
        const persisted = {
            settings: settingsStore,
            timestamp: Date.now()
        };
        localStorage.setItem('voidCurrentPresetName', presetName);
        localStorage.setItem('voidSettings', JSON.stringify(settingsStore));
        // Save other preset data
        localStorage.setItem('voidPresetData', JSON.stringify(preset));
        
        location.href = '/index.html';
    } catch (e) {
        document.body.textContent = 'ERROR: ' + e.message;
    }
})();
</script>
</body>
</html>
