<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Void Typeface — Misha Ivanov</title>
    <!-- Preload fonts to prevent FOUT -->
    <link rel="preload" href="https://mishaivanov.ru/fonts/CoFoSans-Regular.woff2" as="font" type="font/woff2" crossorigin="anonymous">
    <link rel="preload" href="https://mishaivanov.ru/fonts/CoFoSans-Medium.woff2" as="font" type="font/woff2" crossorigin="anonymous">
    <link rel="stylesheet" href="styles.css">
    <script>
        // Check mobile device and hide panels before main JS loads
        (function() {
            const width = window.innerWidth;
            const isTouchDevice = 'ontouchstart' in window || navigator.maxTouchPoints > 0;
            const userAgent = navigator.userAgent.toLowerCase();
            const isTablet = /ipad|android(?!.*mobile)|tablet/i.test(userAgent);
            const isMobilePhone = /mobile|iphone|ipod|android.*mobile|blackberry|windows phone/i.test(userAgent);
            const isMobile = (width < 768 && isTouchDevice && !isTablet) || (isMobilePhone && width < 1024);
            
            if (isMobile) {
                document.documentElement.classList.add('is-mobile');
            }
        })();
    </script>
</head>
<body>
    <div class="container">
        <!-- Top Navigation -->
        <div class="top-links">
            <a href="https://mishaivanov.com/void" class="top-link" id="aboutVoidLink">← About Void</a>
            
            <!-- Preset Dropdown -->
            <div class="preset-dropdown" id="presetDropdown">
                <button class="preset-dropdown-toggle" id="presetDropdownToggle" type="button" aria-haspopup="listbox" aria-expanded="false">
                    <span class="preset-dropdown-text">New</span>
                    <svg class="preset-dropdown-arrow" width="12" height="8" viewBox="0 0 12 8" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <path d="M1 1L6 6L11 1" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
                    </svg>
                </button>
                <ul class="preset-dropdown-menu" id="presetDropdownMenu" role="listbox">
                    <!-- Presets will be added dynamically -->
                </ul>
            </div>

            <!-- Save Preset Button (hidden by default, shown via JS when needed) -->
            <button class="top-link" id="savePresetBtn" type="button" style="display: none;">Save</button>

            <!-- Delete Preset Button (hidden by default, shown via JS when needed) -->
            <button class="top-link btn-danger" id="deletePresetBtn" type="button" style="display: none;">Delete</button>
        </div>

        <div class="main-content">
            <!-- Main Canvas -->
            <div class="canvas-container" id="canvasContainer">
                <!-- Alternatives Panel (shown only in editor mode) -->
                <aside class="editor-alternatives-panel" id="editorAlternativesPanel" style="display: none;">
                    <div class="editor-alternatives-header">
                        <span>Alternatives</span>
                    </div>
                    <div class="editor-alternatives-content" id="editorAlternativesContent">
                        <!-- Alternatives will be added dynamically -->
                    </div>
                </aside>
                
                <canvas id="mainCanvas"></canvas>
                <!-- Editor hint (shown only in editor mode) -->
                <div class="editor-hint" id="editorHint" style="display: none;">↑↓ to switch, ←→ to rotate</div>
            </div>

            <!-- General Panel -->
            <aside class="controls-panel controls-panel-left" id="controlsPanel">
                <div class="panel-header" id="controlsPanelHeader">
                    <span>General</span>
                    <span class="collapse-icon">
                        <svg width="10" height="6" viewBox="0 0 12 8" fill="none" xmlns="http://www.w3.org/2000/svg">
                            <path d="M1 1L6 6L11 1" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
                        </svg>
                    </span>
                </div>
                <div class="panel-content">
                    <section class="control-section">
                        <!-- Module -->
                        <div class="control-group">
                            <label for="moduleSizeSlider">
                                <span>Module <span class="unit">px</span></span>
                                <input type="text" class="value-display" id="moduleSizeValue" value="24">
                            </label>
                            <input type="range" id="moduleSizeSlider" min="4" max="64" value="24" step="1">
                        </div>

                        <!-- Stem Weight (with dice for range mode) -->
                        <div class="control-group dice-slider-group" id="stemDiceGroup">
                            <label for="stemSlider">
                                <span>Stem Weight <span class="unit">mod</span> <button type="button" class="dice-btn" id="stemDiceBtn" data-param="stem" title="Random range (min–max)" aria-label="Toggle random range">↔</button></span>
                                <input type="text" class="value-display" id="stemValue" value="0.5">
                            </label>
                            <div class="dice-single" id="stemSingleWrap">
                                <input type="range" id="stemSlider" min="0.1" max="3.0" value="0.5" step="0.1">
                            </div>
                            <div class="dice-range" id="stemRangeWrap" style="display: none;">
                                <div id="randomStemRangeSlider" class="range-slider-container"></div>
                                <div class="range-slider-values">
                                    <input type="text" class="value-display" id="randomStemMinValue" value="0.5">
                                    <input type="text" class="value-display" id="randomStemMaxValue" value="1.0">
                                </div>
                            </div>
                        </div>

                        <!-- Text Controls: Spacing, Line Height, Alignment (compact row) -->
                        <div class="control-group text-controls-row">
                            <!-- Letter Spacing (Tracking) -->
                            <div class="compact-input-group" title="Letter Spacing">
                                <svg class="compact-input-icon" width="16" height="16" viewBox="0 0 16 16" fill="none" xmlns="http://www.w3.org/2000/svg">
                                    <path d="M3,12h10M3,12l2-2M3,12l2,2M13,12l-2-2M13,12l-2,2" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"/>
                                    <path d="M8,3v6M5,3h6" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/>
                                </svg>
                                <input type="number" class="compact-input" id="letterSpacingValue" value="1" min="0" max="16" step="1">
                            </div>
                            
                            <!-- Line Height (Leading) -->
                            <div class="compact-input-group" title="Line Height">
                                <svg class="compact-input-icon" width="16" height="16" viewBox="0 0 16 16" fill="none" xmlns="http://www.w3.org/2000/svg">
                                    <path d="M4,3.5v9M4,3.5l2,2M4,3.5l-2,2M4,12.5l2-2M4,12.5l-2-2" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"/>
                                    <path d="M11,3.6v8.7M8,3.6h6" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/>
                                </svg>
                                <input type="number" class="compact-input" id="lineHeightValue" value="2" min="0" max="16" step="1">
                            </div>
                            
                            <!-- Text Alignment Icons -->
                            <div class="text-align-icons">
                                <input type="radio" name="textAlign" value="left" id="textAlignLeft" class="sr-only">
                                <label for="textAlignLeft" class="align-icon-btn" title="Align Left">
                                    <svg width="16" height="16" viewBox="0 0 16 16" fill="none" xmlns="http://www.w3.org/2000/svg">
                                        <path d="M2 3H14M2 6.5H10M2 10H12M2 13.5H8" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/>
                                    </svg>
                                </label>
                                
                                <input type="radio" name="textAlign" value="center" id="textAlignCenter" class="sr-only" checked>
                                <label for="textAlignCenter" class="align-icon-btn" title="Align Center">
                                    <svg width="16" height="16" viewBox="0 0 16 16" fill="none" xmlns="http://www.w3.org/2000/svg">
                                        <path d="M2 3H14M4 6.5H12M3 10H13M5 13.5H11" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/>
                                    </svg>
                                </label>
                                
                                <input type="radio" name="textAlign" value="right" id="textAlignRight" class="sr-only">
                                <label for="textAlignRight" class="align-icon-btn" title="Align Right">
                                    <svg width="16" height="16" viewBox="0 0 16 16" fill="none" xmlns="http://www.w3.org/2000/svg">
                                        <path d="M2 3H14M6 6.5H14M4 10H14M8 13.5H14" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/>
                                    </svg>
                                </label>
                            </div>
                        </div>

                        <!-- Text Input -->
                        <div class="control-group">
                            <textarea id="textInput" rows="3" placeholder="Type your text here...">Void
Typeface
Code</textarea>
                        </div>

                    </section>
                    


                </div>
            </aside>

            <!-- Style Panel -->
            <aside class="controls-panel" id="variabilityPanel">
                <div class="panel-header" id="variabilityPanelHeader">
                    <span>Style</span>
                    <span class="collapse-icon">
                        <svg width="10" height="6" viewBox="0 0 12 8" fill="none" xmlns="http://www.w3.org/2000/svg">
                            <path d="M1 1L6 6L11 1" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
                        </svg>
                    </span>
                </div>
                <div class="panel-content">
                    <section class="control-section">
                        <!-- Lines (with dice) -->
                        <div class="control-group dice-slider-group" id="strokesDiceGroup">
                            <label for="strokesSlider">
                                <span>Lines <button type="button" class="dice-btn" id="strokesDiceBtn" data-param="strokes" title="Random range (min–max)" aria-label="Toggle random range">↔</button></span>
                                <input type="text" class="value-display" id="strokesValue" value="1">
                            </label>
                            <div class="dice-single" id="strokesSingleWrap">
                                <input type="range" id="strokesSlider" min="1" max="64" value="1" step="1">
                            </div>
                            <div class="dice-range" id="strokesRangeWrap" style="display: none;">
                                <div id="randomStrokesRangeSlider" class="range-slider-container"></div>
                                <div class="range-slider-values">
                                    <input type="text" class="value-display" id="randomStrokesMinValue" value="1">
                                    <input type="text" class="value-display" id="randomStrokesMaxValue" value="4">
                                </div>
                            </div>
                        </div>

                        <!-- Contrast (with dice, dimmed when Lines=1) -->
                        <div class="control-group dice-slider-group" id="strokeGapRatioControlGroup">
                            <label for="strokeGapRatioSlider">
                                <span>Contrast <button type="button" class="dice-btn" id="contrastDiceBtn" data-param="contrast" title="Random range (min–max)" aria-label="Toggle random range">↔</button></span>
                                <input type="text" class="value-display" id="strokeGapRatioValue" value="1.0">
                            </label>
                            <div class="dice-single" id="contrastSingleWrap">
                                <input type="range" id="strokeGapRatioSlider" min="0.1" max="8" value="1.0" step="0.1">
                            </div>
                            <div class="dice-range" id="contrastRangeWrap" style="display: none;">
                                <div id="randomContrastRangeSlider" class="range-slider-container"></div>
                                <div class="range-slider-values">
                                    <input type="text" class="value-display" id="randomContrastMinValue" value="0.1">
                                    <input type="text" class="value-display" id="randomContrastMaxValue" value="2.0">
                                </div>
                            </div>
                        </div>

                        <!-- Dashes section -->
                        <div class="dashes-section" id="dashesSection">
                            <div class="section-divider-header" id="dashesSectionHeader">
                                <label class="section-toggle-label" for="dashEnabledCheckbox">
                                    <input type="checkbox" id="dashEnabledCheckbox" class="sr-only">
                                    Dashes
                                    <svg class="section-toggle-icon" viewBox="0 0 16 16" fill="none" xmlns="http://www.w3.org/2000/svg"><circle cx="8" cy="8" r="5.5" stroke="currentColor" stroke-width="1.3"/><line x1="8" y1="2.5" x2="8" y2="8" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/></svg>
                                </label>
                            </div>
                            <div class="dashes-section-content" id="dashesSectionContent">
                                <div class="control-group dice-slider-group" id="dashLengthControlGroup">
                                    <label for="dashLengthSlider">
                                        <span>Dash Length <button type="button" class="dice-btn" id="dashLengthDiceBtn" data-param="dashLength" title="Random range (min–max)" aria-label="Toggle random range">↔</button></span>
                                        <input type="text" class="value-display" id="dashLengthValue" value="1.00">
                                    </label>
                                    <div class="dice-single" id="dashLengthSingleWrap">
                                        <input type="range" id="dashLengthSlider" min="0.01" max="8" value="1.00" step="0.01">
                                    </div>
                                    <div class="dice-range" id="dashLengthRangeWrap" style="display: none;">
                                        <div id="randomDashLengthRangeSlider" class="range-slider-container"></div>
                                        <div class="range-slider-values">
                                            <input type="text" class="value-display" id="randomDashLengthMinValue" value="1.0">
                                            <input type="text" class="value-display" id="randomDashLengthMaxValue" value="1.5">
                                        </div>
                                    </div>
                                </div>
                                <div class="control-group dice-slider-group" id="gapLengthControlGroup">
                                    <label for="gapLengthSlider">
                                        <span>Gap Length <button type="button" class="dice-btn" id="gapLengthDiceBtn" data-param="gapLength" title="Random range (min–max)" aria-label="Toggle random range">↔</button></span>
                                        <input type="text" class="value-display" id="gapLengthValue" value="1.50">
                                    </label>
                                    <div class="dice-single" id="gapLengthSingleWrap">
                                        <input type="range" id="gapLengthSlider" min="0.01" max="8" value="1.50" step="0.01">
                                    </div>
                                    <div class="dice-range" id="gapLengthRangeWrap" style="display: none;">
                                        <div id="randomGapLengthRangeSlider" class="range-slider-container"></div>
                                        <div class="range-slider-values">
                                            <input type="text" class="value-display" id="randomGapLengthMinValue" value="1.0">
                                            <input type="text" class="value-display" id="randomGapLengthMaxValue" value="1.5">
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>

                    </section>
                </div>
            </aside>

            <!-- Random Panel (always visible) -->
            <aside class="controls-panel controls-panel-random panel-collapsed" id="randomPanel">
                <div class="panel-header" id="randomPanelHeader">
                    <span>Random <span class="dice-count-badge" id="diceCountBadge"></span></span>
                    <span class="collapse-icon collapsed">
                        <svg width="10" height="6" viewBox="0 0 12 8" fill="none" xmlns="http://www.w3.org/2000/svg">
                            <path d="M1 1L6 6L11 1" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
                        </svg>
                    </span>
                </div>
                <div class="panel-content">
                    <section class="control-section">
                        <div id="randomParamsList" class="random-params-list"></div>
                    </section>
                </div>
                <div class="random-panel-actions">
                    <button type="button" class="btn-secondary" id="shuffleBtn" style="flex: 1;">🎲</button>
                    <button type="button" class="btn-secondary" id="renewRandomBtn" style="flex: 1;">Randomize</button>
                    <button type="button" class="btn-secondary" id="resetAllDiceBtn" style="flex: 1;">↺</button>
                </div>
            </aside>

            <!-- Effects Panel (bottom right) -->
            <aside class="controls-panel controls-panel-effects" id="effectsPanel">
                <div class="panel-header" id="effectsPanelHeader">
                    <span>Effects</span>
                    <span class="collapse-icon">
                        <svg width="10" height="6" viewBox="0 0 12 8" fill="none" xmlns="http://www.w3.org/2000/svg">
                            <path d="M1 1L6 6L11 1" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
                        </svg>
                    </span>
                </div>
                <div class="panel-content">
                    <section class="control-section effects-panel-section">
                        <div class="section-divider-header" id="wobblySectionHeader">
                            <label class="section-toggle-label" for="wobblyCheckbox">
                                <input type="checkbox" id="wobblyCheckbox" class="sr-only">
                                Wobble
                                <svg class="section-toggle-icon" viewBox="0 0 16 16" fill="none" xmlns="http://www.w3.org/2000/svg"><circle cx="8" cy="8" r="5.5" stroke="currentColor" stroke-width="1.3"/><line x1="8" y1="2.5" x2="8" y2="8" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/></svg>
                            </label>
                        </div>
                        <div class="control-group dice-slider-group wobbly-slider" id="wobblyAmountControlGroup">
                            <label for="wobblyAmountSlider">
                                <span>Amount <span class="unit">px</span> <button type="button" class="dice-btn" id="wobblyAmountDiceBtn" data-param="wobblyAmount" title="Random range (min–max)" aria-label="Toggle random range">↔</button></span>
                                <input type="text" class="value-display" id="wobblyAmountValue" value="3">
                            </label>
                            <div class="dice-single" id="wobblyAmountSingleWrap">
                                <input type="range" id="wobblyAmountSlider" min="0" max="20" value="3" step="0.5">
                            </div>
                            <div class="dice-range" id="wobblyAmountRangeWrap" style="display: none;">
                                <div id="randomWobblyAmountRangeSlider" class="range-slider-container"></div>
                                <div class="range-slider-values">
                                    <input type="text" class="value-display" id="randomWobblyAmountMinValue" value="0">
                                    <input type="text" class="value-display" id="randomWobblyAmountMaxValue" value="10">
                                </div>
                            </div>
                        </div>
                        <div class="control-group dice-slider-group wobbly-slider" id="wobblyFrequencyControlGroup">
                            <label for="wobblyFrequencySlider">
                                <span>Noise <button type="button" class="dice-btn" id="wobblyFrequencyDiceBtn" data-param="wobblyFrequency" title="Random range (min–max)" aria-label="Toggle random range">↔</button></span>
                                <input type="text" class="value-display" id="wobblyFrequencyValue" value="0.1">
                            </label>
                            <div class="dice-single" id="wobblyFrequencySingleWrap">
                                <input type="range" id="wobblyFrequencySlider" min="0.01" max="0.5" value="0.1" step="0.01">
                            </div>
                            <div class="dice-range" id="wobblyFrequencyRangeWrap" style="display: none;">
                                <div id="randomWobblyFrequencyRangeSlider" class="range-slider-container"></div>
                                <div class="range-slider-values">
                                    <input type="text" class="value-display" id="randomWobblyFrequencyMinValue" value="0.05">
                                    <input type="text" class="value-display" id="randomWobblyFrequencyMaxValue" value="0.2">
                                </div>
                            </div>
                        </div>
                        <div class="control-group pill-toggle-row" id="effectsPillToggles">
                            <label class="pill-toggle" id="roundedCapsLabel" for="roundedCapsCheckbox" data-tooltip="Round line endings">
                                <input type="checkbox" id="roundedCapsCheckbox" class="sr-only">
                                <span>Round Caps</span>
                            </label>
                            <label class="pill-toggle" id="closeEndsLabel" for="closeEndsCheckbox" data-tooltip="Close line ends in multiline mode" data-tooltip-disabled="Close line ends in multiline mode. Requires Lines > 1">
                                <input type="checkbox" id="closeEndsCheckbox" class="sr-only">
                                <span>Close Stems</span>
                            </label>
                            <label class="pill-toggle" id="dashChessLabel" for="dashChessCheckboxPD" data-tooltip="Alternate dash pattern between lines" data-tooltip-disabled="Alternate dash pattern between lines. Requires Dashes enabled and Lines > 1">
                                <input type="checkbox" id="dashChessCheckboxPD" class="sr-only">
                                <span>Chess Order</span>
                            </label>
                            <label class="pill-toggle" for="alternativeGlyphsCheckbox" data-tooltip="Use alternative glyph forms">
                                <input type="checkbox" id="alternativeGlyphsCheckbox" class="sr-only">
                                <span>Alt Glyphs</span>
                            </label>
                            <label class="pill-toggle" for="chaosCheckbox" data-tooltip="Full random mode (each module unique)">
                                <input type="checkbox" id="chaosCheckbox" class="sr-only">
                                <span>Chaos</span>
                            </label>
                            <label class="pill-toggle" for="showGridCheckbox" data-tooltip="Show background grid">
                                <input type="checkbox" id="showGridCheckbox" class="sr-only" checked>
                                <span>Grid</span>
                            </label>
                            <label class="pill-toggle" for="showEndpointsCheckbox" data-tooltip="Show joints and endpoints of glyph modules">
                                <input type="checkbox" id="showEndpointsCheckbox" class="sr-only">
                                <span>Joints</span>
                            </label>
                            <label class="pill-toggle" for="showTestCheckbox" data-tooltip="Show endpoint markers on glyphs">
                                <input type="checkbox" id="showTestCheckbox" class="sr-only">
                                <span>Ends</span>
                            </label>
                        </div>
                    </section>
                </div>
            </aside>

            <!-- Colors Panel -->
            <aside class="controls-panel controls-panel-text" id="viewColorsPanel">
                <div class="panel-header" id="viewColorsPanelHeader">
                    <span>Colors</span>
                    <span class="collapse-icon">
                        <svg width="10" height="6" viewBox="0 0 12 8" fill="none" xmlns="http://www.w3.org/2000/svg">
                            <path d="M1 1L6 6L11 1" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
                        </svg>
                    </span>
                </div>
                <div class="panel-content">

                    <!-- Color Source: Solid / Gradient -->
                    <div class="control-group color-source-row">
                        <div class="style-buttons-container" id="colorSourceButtons">
                            <button type="button" class="style-button active" data-color-source="solid">Solid</button>
                            <button type="button" class="style-button" data-color-source="gradient">Gradient</button>
                        </div>
                    </div>

                    <!-- ========== SOLID MODE: compact swatches ========== -->
                    <div id="colorSolidControls">
                        <div class="color-swatches-compact" id="colorPickersGroup">
                            <div class="color-swatch-row">
                                <div class="color-swatch-compact" id="letterColorItem" data-color-type="letter">
                                    <button type="button" class="color-dot color-dot--expandable" id="letterColorPreview" title="HSB — click row or swatch to expand" aria-label="Open HSB color controls"></button>
                                    <span class="color-label">Type</span>
                                    <input type="text" class="color-swatch-hex" id="letterColorHex" value="#ffffff" maxlength="7" spellcheck="false" autocomplete="off" aria-label="Type color hex">
                                </div>
                                <div class="color-hsb-slot" id="letterColorHsbSlot">
                                    <div id="unifiedColorPickerContainer"></div>
                                </div>
                            </div>
                            <div class="color-swatch-row">
                                <div class="color-swatch-compact" id="bgColorItem" data-color-type="bg">
                                    <button type="button" class="color-dot color-dot--expandable" id="bgColorPreview" title="HSB — click row or swatch to expand" aria-label="Open HSB color controls"></button>
                                    <span class="color-label">Back</span>
                                    <input type="text" class="color-swatch-hex" id="bgColorHex" value="#000000" maxlength="7" spellcheck="false" autocomplete="off" aria-label="Background color hex">
                                </div>
                                <div class="color-hsb-slot" id="bgColorHsbSlot"></div>
                            </div>
                            <div class="color-swatch-row">
                                <div class="color-swatch-compact" id="gridColorItem" data-color-type="grid">
                                    <button type="button" class="color-dot color-dot--expandable" id="gridColorPreview" title="HSB — click row or swatch to expand" aria-label="Open HSB color controls"></button>
                                    <span class="color-label">Grid</span>
                                    <input type="text" class="color-swatch-hex" id="gridColorHex" value="#333333" maxlength="7" spellcheck="false" autocomplete="off" aria-label="Grid color hex">
                                </div>
                                <div class="color-hsb-slot" id="gridColorHsbSlot"></div>
                            </div>
                        </div>
                    </div>

                    <!-- ========== GRADIENT MODE: compact swatches ========== -->
                    <div id="colorGradientControls" style="display: none;">
                        <div class="color-swatches-compact">
                            <div class="color-swatch-row">
                                <div class="color-swatch-compact" id="gradientStartColorItem" data-color-type="gradientStart">
                                    <button type="button" class="color-dot color-dot--expandable" id="gradientStartColorPreview" style="background: #ff0000;" title="HSB — click row or swatch to expand" aria-label="Open HSB color controls"></button>
                                    <span class="color-label">Type Gradient Start</span>
                                    <input type="text" class="color-swatch-hex" id="gradientStartColorHex" value="#ff0000" maxlength="7" spellcheck="false" autocomplete="off" aria-label="Gradient start hex">
                                </div>
                                <div class="color-hsb-slot" id="gradientStartColorHsbSlot"></div>
                            </div>
                            <div class="color-swatch-row">
                                <div class="color-swatch-compact" id="gradientEndColorItem" data-color-type="gradientEnd">
                                    <button type="button" class="color-dot color-dot--expandable" id="gradientEndColorPreview" style="background: #0000ff;" title="HSB — click row or swatch to expand" aria-label="Open HSB color controls"></button>
                                    <span class="color-label">Type Gradient End</span>
                                    <input type="text" class="color-swatch-hex" id="gradientEndColorHex" value="#0000ff" maxlength="7" spellcheck="false" autocomplete="off" aria-label="Gradient end hex">
                                </div>
                                <div class="color-hsb-slot" id="gradientEndColorHsbSlot"></div>
                            </div>
                            <div class="color-swatch-row">
                                <div class="color-swatch-compact" id="gradientBgColorItem" data-color-type="gradientBg">
                                    <button type="button" class="color-dot color-dot--expandable" id="gradientBgColorPreview" title="HSB — click row or swatch to expand" aria-label="Open HSB color controls"></button>
                                    <span class="color-label">Back</span>
                                    <input type="text" class="color-swatch-hex" id="gradientBgColorHex" value="#000000" maxlength="7" spellcheck="false" autocomplete="off" aria-label="Background color hex">
                                </div>
                                <div class="color-hsb-slot" id="gradientBgColorHsbSlot"></div>
                            </div>
                            <div class="color-swatch-row">
                                <div class="color-swatch-compact" id="gradientGridColorItem" data-color-type="gradientGrid">
                                    <button type="button" class="color-dot color-dot--expandable" id="gradientGridColorPreview" title="HSB — click row or swatch to expand" aria-label="Open HSB color controls"></button>
                                    <span class="color-label">Grid</span>
                                    <input type="text" class="color-swatch-hex" id="gradientGridColorHex" value="#333333" maxlength="7" spellcheck="false" autocomplete="off" aria-label="Grid color hex">
                                </div>
                                <div class="color-hsb-slot" id="gradientGridColorHsbSlot"></div>
                            </div>
                        </div>
                    </div>

                    <!-- Palette slider (shared, with ↔ dice) -->
                    <div class="control-group dice-slider-group" id="paletteColorsDiceGroup">
                        <label for="paletteColorsSlider">
                            <span>Palette <button type="button" class="dice-btn" id="paletteColorsDiceBtn" data-param="paletteColors" title="Random range" aria-label="Toggle random palette range">↔</button></span>
                            <input type="text" class="value-display" id="paletteColorsValue" value="3">
                        </label>
                        <div class="dice-single" id="paletteColorsSingleWrap">
                            <input type="range" id="paletteColorsSlider" min="3" max="32" step="1" value="3">
                        </div>
                        <div class="dice-range" id="paletteColorsRangeWrap" style="display: none;">
                            <div id="randomPaletteColorsRangeSlider" class="range-slider-container"></div>
                            <div class="range-slider-values">
                                <input type="text" class="value-display" id="randomPaletteColorsMinValue" value="3">
                                <input type="text" class="value-display" id="randomPaletteColorsMaxValue" value="32">
                            </div>
                        </div>
                    </div>

                    <!-- Palette options (always at bottom) -->
                    <div class="control-group pill-toggle-row" id="paletteOptionsRow">
                        <label class="pill-toggle" for="randomColorBWCheckbox" data-tooltip="Generate only black & white colors">
                            <input type="checkbox" id="randomColorBWCheckbox" class="sr-only">
                            <span>BW</span>
                        </label>
                        <label class="pill-toggle" for="randomColorLockBgCheckbox" data-tooltip="Keep background color unchanged">
                            <input type="checkbox" id="randomColorLockBgCheckbox" class="sr-only">
                            <span>Lock BG</span>
                        </label>
                        <label class="pill-toggle" for="randomColorLockGridCheckbox" data-tooltip="Keep grid color unchanged">
                            <input type="checkbox" id="randomColorLockGridCheckbox" class="sr-only">
                            <span>Lock Grid</span>
                        </label>
                    </div>

                </div>
            </aside>

            <!-- Editor Panel (replaces Text Panel in Editor mode) -->
            <aside class="controls-panel controls-panel-editor" id="editorPanel" style="display: none;">
                <div class="panel-content">
                    <section class="control-section">
                        <!-- Character Selector -->
                        <div class="control-group">
                            <label for="editorCharSelector">
                                <span>Character</span>
                            </label>
                            <input type="text" id="editorCharSelector" class="editor-char-input" placeholder="A-Z, 0-9" maxlength="1" style="width: 100%; padding: 8px 12px; font-size: 24px; text-align: center; font-family: var(--font-mono); border: 1px solid var(--color-border); border-radius: 4px; background: var(--color-canvas-bg); color: var(--color-text);">
                        </div>
                        
                        <!-- Current Module Info -->
                        <div class="control-group">
                            <div class="editor-module-display" id="editorCurrentModule">S0 (0°)</div>
                        </div>
                        
                        <!-- Glyph String (auto-updating) -->
                        <div class="control-group editor-glyph-string-group">
                            <textarea id="editorGlyphString" rows="2">E0E0E0E0E0 E0E0E0E0E0 E0E0E0E0E0 E0E0E0E0E0 E0E0E0E0E0</textarea>
                        </div>
                        
                        <!-- Save Changes Button -->
                        <div class="control-group editor-save-button-group">
                            <button class="editor-btn" id="editorSaveChangesBtn" type="button" style="display: none;">Save Changes</button>
                        </div>
                        
                        <!-- Move Button -->
                        <div class="control-group editor-save-button-group">
                            <button class="editor-btn" id="editorSaveBtn" type="button">Move ↓</button>
                        </div>
                        
                        <!-- Saved Glyphs Collection -->
                        <div class="control-group editor-saved-glyphs-group">
                            <textarea id="editorSavedGlyphs"></textarea>
                        </div>
                        
                        <!-- Copy Button -->
                        <div class="control-group editor-copy-button-group">
                            <button class="editor-btn" id="editorCopyBtn" type="button">Copy</button>
                        </div>
                    </section>
                </div>
            </aside>

        </div>
    </div>

    <!-- Bottom Action Buttons -->
    <nav class="bottom-buttons">
        <button class="btn-fixed" id="exportPngBtn" type="button">Export PNG</button>
        <button class="btn-fixed" id="copyBtn">Copy SVG</button>
        <button class="btn-fixed" id="exportBtn">Export SVG ⌘E</button>
        <button class="btn-fixed" id="renewBtn" style="display: none;">Update</button>
    </nav>

    <!-- Modal Dialogs -->
    <dialog class="modal" id="presetModal">
        <div class="modal-content">
            <h3 class="modal-title" id="modalTitle">Title</h3>
            <p class="modal-text" id="modalText"></p>
            <input type="text" class="modal-input" id="modalInput" style="display: none;" placeholder="Preset name">
            <div class="modal-buttons" id="modalButtons">
                <!-- Buttons will be added dynamically -->
            </div>
        </div>
    </dialog>

    <script type="module" src="js/main.js"></script>
</body>
</html>
