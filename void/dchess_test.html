<!DOCTYPE html>
<html><head><style>body{margin:0;background:#e0e0e0;}</style></head>
<body>
<script type="module">
const { VoidRenderer } = await import('http://localhost:8080/js/core/VoidRenderer.js');
const { VoidExporter } = await import('http://localhost:8080/js/core/VoidExporter.js');

const params0 = new URLSearchParams(location.search);
const dashChess = params0.get('chess') === '1';

const presetRes = await fetch('http://localhost:8080/presets/nikitas-ropes.json');
const preset = await presetRes.json();
const s = preset.settings;
s.dashChess = dashChess;

const settings = { get: (k) => s[k] };
const moduleSize = s.moduleSize;
const stem = moduleSize * s.stemMultiplier * 2;

const params = {
    stem, moduleSize,
    letterSpacing: moduleSize * s.letterSpacingMultiplier,
    lineHeight: moduleSize * s.lineHeightMultiplier,
    strokesNum: s.strokesNum, strokeGapRatio: s.strokeGapRatio,
    mode: 'sd', color: s.letterColor, bgColor: s.bgColor, gridColor: s.gridColor,
    textAlign: 'center', showGrid: false, isRandom: false, text: s.text,
    roundedCaps: true, closeEnds: false,
    dashEnabled: true, dashLength: s.dashLength, gapLength: s.gapLength,
    dashChess: dashChess,
    useCustomModuleColor: false,
    wobblyEnabled: false, wobblyAmount: 0, wobblyFrequency: 0.1,
    gradientMode: s.colorMode,
    gradientStartColor: s.gradientStartColor,
    gradientEndColor: s.gradientEndColor,
};

const canvas = document.createElement('canvas');
canvas.width = 600; canvas.height = 600;
const renderer = new VoidRenderer(canvas);
renderer.alternativeGlyphCache = preset.alternativeGlyphCache || {};
renderer.updateParams(params);

const exporter = new VoidExporter(renderer, settings);
const svg = exporter.getSVGContent();
document.body.innerHTML = svg;
document.title = 'dashChess=' + dashChess;
</script>
</body></html>
