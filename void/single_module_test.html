<!DOCTYPE html><html><head><style>body{margin:0;background:#ffffff}</style></head>
<body>
<script type="module">
import { VoidRenderer } from 'http://localhost:8080/js/core/VoidRenderer.js';
import { VoidExporter } from 'http://localhost:8080/js/core/VoidExporter.js';

const params0 = new URLSearchParams(location.search);
const chess = params0.get('chess') === '1';
const canvas = document.createElement('canvas');
canvas.width = 200; canvas.height = 200;

const renderer = new VoidRenderer(canvas);
const settings = { get: (k) => params[k] };

const params = {
    stem: 48, moduleSize: 48,
    letterSpacing: 48, lineHeight: 48,
    strokesNum: 5, strokeGapRatio: 2.5,
    mode: 'sd', color: '#000', bgColor: '#fff', gridColor: '#aaa',
    textAlign: 'center', showGrid: false, isRandom: false,
    text: 'I',
    roundedCaps: true, closeEnds: false,
    dashEnabled: true, dashLength: 5.27, gapLength: 1.14,
    dashChess: chess,
    useCustomModuleColor: false,
    wobblyEnabled: false, wobblyAmount: 0, wobblyFrequency: 0.1,
    gradientMode: 'manual',
    gradientStartColor: '#000', gradientEndColor: '#000',
};
renderer.updateParams(params);
renderer.render();

const exporter = new VoidExporter(renderer, settings);
const svg = exporter.getSVGContent();

document.body.innerHTML = '<canvas id="c" width="200" height="200" style="background:white"></canvas><br>' + svg;
const c2 = document.getElementById('c').getContext('2d');
c2.drawImage(canvas, 0, 0);
</script>
</body></html>
